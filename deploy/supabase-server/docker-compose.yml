# Docker Compose for A3Stats Supabase Self-Hosting
# Based on Supabase official self-hosting guide

services:
  db:
    container_name: supabase-db
    image: supabase/postgres:15.1.0.117
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal # Reduce logging
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data

  gotrue:
    container_name: supabase-auth
    image: supabase/gotrue:v2.132.3
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "false" # Disabled for local-only unless SMTP is set
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    ports:
      - 9999:9999 # Auth internal port

  postgrest:
    container_name: supabase-postgrest
    image: postgrest/postgrest:v12.0.1
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_STATS: "false"

  realtime:
    container_name: supabase-realtime
    image: supabase/realtime:v2.25.59
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      PORT: 4000
      DB_HOST: db
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      REPLICATION_MODE: RLS

  kong:
    container_name: supabase-kong
    image: kong:2.8.1
    restart: always
    depends_on:
      gotrue:
        condition: service_started
      postgrest:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
    volumes:
      - ./volumes/api/kong.yml:/var/lib/kong/kong.yml
    ports:
      - 54321:8000 # Main API port
      - 54322:8443

networks:
  default:
    name: supabase_network
